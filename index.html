<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PidatoPimpinan.AI - Aplikasi Naskah Sambutan</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>

  <!-- Babel untuk kompilasi JSX langsung di browser -->
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  
  <!-- PDF.js untuk Ekstraksi Teks dari Upload PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script>
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
  </script>

  <!-- Import Map untuk Module React, Lucide Icons, dan Firebase -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js"
      }
    }
  </script>

  <style>
    /* Mengatur font Arial untuk seluruh elemen aplikasi */
    * {
      font-family: Arial, Helvetica, sans-serif !important;
    }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-900 text-slate-800 m-0 p-0 overflow-x-hidden">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Plus, Trash2, FileType, Upload, Image as ImageIcon, 
      Globe, Sparkles, Loader2, LogOut, KeyRound, 
      Mail, Lock, User, MessageCircle, FilePenLine, 
      History, Save, X, ArrowRight, FileText, QrCode, Crown, FileUp
    } from 'lucide-react';
    import { initializeApp } from 'firebase/app';
    import { 
      getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, 
      sendPasswordResetEmail, onAuthStateChanged, signOut, signInAnonymously 
    } from 'firebase/auth';
    import { 
      getFirestore, doc, setDoc, collection, getDocs, deleteDoc, getDoc, addDoc 
    } from 'firebase/firestore';

    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyExYlVOtlHkZ5beVzFPDQQUm8TApcy_DCGitbSSk3clieuxEBXFzuxOfittcBQjLkwYw/exec"; 

    const myFirebaseConfig = {
      apiKey: "AIzaSyDYNVowV6l70H1yrTV0vazIrkvfcbV_41w",
      authDomain: "pidato-pimpinan-5d1fa.firebaseapp.com",
      projectId: "pidato-pimpinan-5d1fa",
      storageBucket: "pidato-pimpinan-5d1fa.firebasestorage.app",
      messagingSenderId: "976152675088",
      appId: "1:976152675088:web:1d722e2091188b46f05b95"
    };

    const activeFirebaseConfig = (typeof __firebase_config !== 'undefined' && Object.keys(myFirebaseConfig.apiKey).length === 0) 
      ? JSON.parse(__firebase_config) 
      : myFirebaseConfig;

    const app = initializeApp(activeFirebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    function PremiumModal({ onClose, onRegister, alertMessage }) {
      return (
        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 print:hidden">
          <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={onClose}></div>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm flex flex-col relative z-10 overflow-hidden transform transition-all border border-slate-200 text-slate-800">
            <div className="bg-gradient-to-r from-[#8b5cf6] to-[#3b82f6] p-5 text-center relative text-white">
              <button onClick={onClose} className="absolute top-3 right-3 opacity-80 hover:opacity-100 transition-opacity"><X size={20} /></button>
              <h2 className="text-xl font-bold drop-shadow-sm tracking-wide uppercase">UPGRADE PREMIUM</h2>
              <p className="text-white/90 text-xs font-medium mt-1">Akses Tanpa Batas & Riwayat Cloud</p>
            </div>
            <div className="p-6">
              {alertMessage && (
                <div className="bg-red-50 border border-red-200 text-red-600 text-[10px] p-3 rounded-xl text-center mb-4 font-black leading-relaxed shadow-sm uppercase tracking-wide">
                  {alertMessage}
                </div>
              )}
              <div className="bg-slate-50 p-5 rounded-xl border border-slate-100 text-center mb-6">
                <p className="text-sm font-bold text-slate-700 mb-1">Dapatkan Kode Akses</p>
                <p className="text-3xl font-black text-[#22c55e] mb-4 tracking-tight">Rp 25.000</p>
                <div className="bg-white p-2 rounded-xl shadow-sm border border-slate-200 inline-block mb-3">
                  <img 
                    src="https://i.ibb.co.com/Ng8hKp9C/Screenshot-2026-04-27-194835.png" 
                    alt="QRIS Pembayaran" 
                    className="w-36 h-36 object-contain mx-auto" 
                    onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/150?text=Gagal+Muat'; }} 
                  />
                </div>
                <p className="text-[11px] text-slate-500 leading-relaxed font-medium px-2">
                  Scan QRIS di atas, lalu kirim bukti pembayaran ke Admin untuk mendapatkan kode akses.
                </p>
              </div>
              <a href="https://wa.me/6287838960454?text=Halo%20Admin,%20saya%20sudah%20melakukan%20pembayaran%20QRIS%20untuk%20Upgrade%20Premium%20PidatoPimpinan.AI.%20Berikut%20bukti%20transfernya:" target="_blank" rel="noreferrer" className="w-full bg-[#22c55e] hover:bg-[#16a34a] text-white py-3.5 rounded-xl font-bold transition-all shadow-[0_4px_15px_rgba(34,197,94,0.3)] flex items-center justify-center gap-2 text-sm uppercase">
                HUBUNGI ADMIN
              </a>
              <div className="text-center mt-6">
                <button onClick={onRegister} className="text-xs text-slate-500 font-bold underline decoration-slate-400 underline-offset-4 hover:text-slate-700 transition-colors uppercase">
                  SUDAH DAPAT KODE? DAFTAR DI SINI
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const fetchGeminiWithBackoff = async (prompt) => {
      const options = {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
        body: JSON.stringify({ action: 'generateAI', prompt: prompt })
      };
      const delays = [1000, 2000, 4000, 8000, 16000];
      for (let i = 0; i < 5; i++) {
        try {
          const response = await fetch(GAS_WEB_APP_URL, options);
          if (!response.ok) throw new Error(`HTTP ${response.status}: Gagal menghubungi server.`);
          const resData = await response.json();
          if (!resData.success) throw new Error(resData.error || "Gagal memproses data AI.");
          const text = (resData.data?.candidates?.[0]?.content?.parts?.[0]?.text) || (resData.candidates?.[0]?.content?.parts?.[0]?.text);
          if (!text) throw new Error("Respons AI kosong.");
          return text;
        } catch (error) {
          if (i === 4) throw new Error("Gagal terhubung ke AI: " + error.message);
          await new Promise(res => setTimeout(res, delays[i]));
        }
      }
    };

    function MainApp({ onLogout, userProfile, userId, isGuest, onGoToRegister }) {
      const [formData, setFormData] = useState({
        logo: null, 
        institutionName: '', 
        eventName: '', 
        eventTheme: '', 
        eventDate: '', 
        eventTime: '', 
        eventLocation: '', 
        speakerName: '', 
        speakerTitle: '', 
        greetingType: 'formal', 
        closingPantun: '', 
        language: 'id', 
        regionalLanguage: '', 
        openingSpeech: '', 
        closingSpeech: '',
        pdfContext: '',
        openingParCount: 2, // Default jumlah paragraf
        contentParCount: 4, // Default jumlah paragraf
        closingParCount: 1  // Default jumlah paragraf
      });

      const [pdfFileName, setPdfFileName] = useState('');
      const [isExtractingPdf, setIsExtractingPdf] = useState(false);

      const [guests, setGuests] = useState([{ title: '' }]);
      const [points, setPoints] = useState(['']);
      const [generatingIndex, setGeneratingIndex] = useState(null);
      const [generatingPantun, setGeneratingPantun] = useState(false);
      const [generatingOpening, setGeneratingOpening] = useState(false);
      const [generatingClosing, setGeneratingClosing] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [historyList, setHistoryList] = useState([]);
      const [isHistoryOpen, setIsHistoryOpen] = useState(false);
      
      const [showPaymentModal, setShowPaymentModal] = useState(false);
      const [paymentModalAlert, setPaymentModalAlert] = useState(''); 
      
      const [guestTokenCount, setGuestTokenCount] = useState(5);
      const previewRef = useRef(null);
      const [notification, setNotification] = useState('');

      useEffect(() => {
        if (!formData.openingSpeech && formData.eventName) {
           const defaultIntro = `Puji dan syukur marilah kita panjatkan ke hadirat Allah SWT, karena atas nikmat dan karunia-Nya kita dapat hadir dalam acara ${formData.eventName} dengan tema "${formData.eventTheme}".\n\nSemoga acara ini dapat berjalan dengan lancar dan memberikan manfaat yang besar bagi kita semua.`;
           setFormData(prev => ({ ...prev, openingSpeech: defaultIntro }));
        }
      }, [formData.eventName, formData.eventTheme]);

      useEffect(() => { if (isHistoryOpen && !isGuest) fetchHistory(); }, [isHistoryOpen, isGuest]);

      useEffect(() => {
        const fetchInitialTokenCount = async () => {
          if (!isGuest || !userProfile) return;
          try {
            let dId = localStorage.getItem('pidato_device_id') || 'dev_' + Math.random().toString(36).substring(2, 15);
            localStorage.setItem('pidato_device_id', dId);
            const se = userProfile.email.toLowerCase().replace(/[^a-z0-9]/g, '_');
            let cud = 0, cue = 0;
            try {
              const snapD = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'guestUsage', dId));
              cud = snapD.exists() ? snapD.data().usage || 0 : 0;
              const snapE = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'guestUsage', se));
              cue = snapE.exists() ? snapE.data().usage || 0 : 0;
            } catch (err) {
              cud = parseInt(localStorage.getItem('guestUsage_' + dId) || '0');
              cue = parseInt(localStorage.getItem('guestUsage_' + se) || '0');
            }
            setGuestTokenCount(Math.max(0, 5 - Math.max(cud, cue)));
          } catch(e) { console.error(e); }
        };
        fetchInitialTokenCount();
      }, [isGuest, userProfile]);

      const checkAndConsumeGuestToken = async () => {
        if (!isGuest) return true;
        try {
          if (!auth.currentUser) await signInAnonymously(auth);
          let dId = localStorage.getItem('pidato_device_id');
          const se = userProfile.email.toLowerCase().replace(/[^a-z0-9]/g, '_');
          let currentUsage = 5 - guestTokenCount;
          
          if (currentUsage >= 5) { 
            setPaymentModalAlert('Token gratis Anda sudah habis! Silakan Upgrade Premium untuk akses tanpa batas.');
            setShowPaymentModal(true); 
            return false; 
          }
          
          const nUsage = currentUsage + 1;
          try {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'guestUsage', dId), { usage: nUsage, email: userProfile.email, lastUsed: new Date().toISOString() }, { merge: true });
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'guestUsage', se), { usage: nUsage, email: userProfile.email, lastUsed: new Date().toISOString() }, { merge: true });
          } catch (err) {
            localStorage.setItem('guestUsage_' + dId, nUsage.toString());
            localStorage.setItem('guestUsage_' + se, nUsage.toString());
          }
          setGuestTokenCount(5 - nUsage);
          return true;
        } catch (err) { return false; }
      };

      const handleInputChange = (e) => setFormData(p => ({ ...p, [e.target.name]: e.target.value }));
      
      const handleLogoUpload = (e) => {
        const file = e.target.files[0];
        if (file && file.size <= 500 * 1024) {
          const reader = new FileReader();
          reader.onloadend = () => setFormData(p => ({ ...p, logo: reader.result }));
          reader.readAsDataURL(file);
        } else if (file) showNotification("Maksimal logo 500KB.");
      };
      const removeLogo = () => setFormData(p => ({ ...p, logo: null }));
      
      const handlePdfUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.type !== 'application/pdf') return showNotification("Harap upload file berformat PDF.");
        
        setPdfFileName(file.name);
        setIsExtractingPdf(true);
        try {
          const arrayBuffer = await file.arrayBuffer();
          const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
          let extractedText = '';
          for (let i = 1; i <= Math.min(pdf.numPages, 3); i++) { 
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            const strings = content.items.map(item => item.str);
            extractedText += strings.join(' ') + '\n';
          }
          setFormData(prev => ({ ...prev, pdfContext: extractedText }));
          showNotification("Isi Surat/Lampiran berhasil dibaca AI!");
        } catch (err) {
          console.error(err);
          showNotification("Gagal membaca file PDF. Pastikan file tidak dikunci.");
          setPdfFileName('');
        } finally {
          setIsExtractingPdf(false);
        }
      };

      const addGuest = () => setGuests([...guests, { title: '' }]);
      const removeGuest = (i) => setGuests(guests.filter((_, idx) => idx !== i));
      const updateGuest = (i, f, v) => { const n = [...guests]; n[i][f] = v; setGuests(n); };
      
      const addPoint = () => setPoints([...points, '']);
      const removePoint = (i) => setPoints(points.filter((_, idx) => idx !== i));
      const updatePoint = (i, v) => { const n = [...points]; n[i] = v; setPoints(n); };

      const getLanguageInstruction = () => {
        return formData.language === 'en' 
            ? "Bahasa Inggris (English)" 
            : formData.language === 'regional' 
                ? `Bahasa Daerah (${formData.regionalLanguage}), jika sulit gunakan Bahasa Indonesia formal` 
                : "Bahasa Indonesia Formal";
      };

      // INSTRUKSI AI UNTUK PEMBUKAAN (DINAMIS)
      const handleAIOpening = async () => {
        if (!formData.eventName) return showNotification("Isi nama acara.");
        if (!(await checkAndConsumeGuestToken())) return;
        setGeneratingOpening(true);
        try {
          let contextStr = `Acara: ${formData.eventName}, Tema: ${formData.eventTheme}.`;
          if (formData.pdfContext) {
             contextStr += ` Referensi dokumen pendukung: "${formData.pdfContext.substring(0, 1000)}".`;
          }
          const prompt = `Buatkan persis ${formData.openingParCount} paragraf PEMBUKAAN pidato resmi. Konteks: ${contextStr} Instruksi: Mulai dengan Puji Syukur. Sebutkan tujuan acara secara singkat. Gaya bahasa: Pejabat, wibawa, hangat. Output: HANYA ${formData.openingParCount} paragraf teks pembuka (tanpa salam pembuka). Gunakan HURUF KAPITAL.`;
          const text = await fetchGeminiWithBackoff(prompt);
          if (text) setFormData(p => ({ ...p, openingSpeech: text.trim() }));
        } catch (e) { showNotification(e.message); } finally { setGeneratingOpening(false); }
      };

      // INSTRUKSI AI UNTUK POINTER ISI (DINAMIS)
      const handleAIGeneratePoint = async (i) => {
        if (!points[i] || points[i].trim().length < 3) return showNotification("Tulis poin minimal 3 huruf.");
        if (!(await checkAndConsumeGuestToken())) return;
        setGeneratingIndex(i);
        try {
          let contextStr = `Konteks Acara: ${formData.eventName}.`;
          if (formData.pdfContext) {
             contextStr += ` Informasi dari Lampiran/Surat Acara: "${formData.pdfContext.substring(0, 1000)}". Tolong sesuaikan narasi berdasarkan lampiran ini.`;
          }
          const prompt = `Kembangkan poin ini menjadi persis ${formData.contentParCount} paragraf pidato formal: "${points[i]}". ${contextStr} Bahasa: ${getLanguageInstruction()}. HANYA TEKS ${formData.contentParCount} PARAGRAF, HURUF KAPITAL.`;
          const text = await fetchGeminiWithBackoff(prompt);
          if (text) {
             setPoints(prev => {
                const n = [...prev];
                n[i] = text.trim();
                return n;
             });
          }
        } catch (e) { showNotification(e.message); } finally { setGeneratingIndex(null); }
      };

      // INSTRUKSI AI UNTUK PENUTUP (DINAMIS)
      const handleAIClosing = async () => {
        if (!points.join('')) return showNotification("Isi materi dulu.");
        if (!(await checkAndConsumeGuestToken())) return;
        setGeneratingClosing(true);
        try {
          let contextStr = `Acara: ${formData.eventName}.`;
          if (formData.pdfContext) {
             contextStr += ` Dokumen acuan: "${formData.pdfContext.substring(0, 800)}".`;
          }
          const prompt = `Buatkan persis ${formData.closingParCount} paragraf PENUTUP pidato berdasarkan materi: ${points.join('. ')}. Konteks Tambahan: ${contextStr} Instruksi: Berikan kesimpulan singkat/harapan. Ajak hadirin berkolaborasi. Ucapkan terima kasih dan maaf. Bahasa: ${getLanguageInstruction()}. Output: HANYA ${formData.closingParCount} paragraf teks penutup. Gunakan HURUF KAPITAL.`;
          const text = await fetchGeminiWithBackoff(prompt);
          if (text) setFormData(p => ({ ...p, closingSpeech: text.trim() }));
        } catch (e) { showNotification(e.message); } finally { setGeneratingClosing(false); }
      };

      const handleAIPantunGenerate = async () => {
        if (!(await checkAndConsumeGuestToken())) return;
        setGeneratingPantun(true);
        try {
          const text = await fetchGeminiWithBackoff(`Buatkan HANYA 1 bait pantun penutup pidato (4 baris bersajak a-b-a-b) untuk acara ${formData.eventName}. Pisahkan antara sampiran (baris 1-2) dan isi (baris 3-4) dengan memberikan baris kosong (enter) di antaranya agar rima terlihat jelas. Jangan berikan pengantar, pilihan, atau opsi lain. Gunakan HURUF KAPITAL.`);
          if (text) setFormData(p => ({ ...p, closingPantun: text.trim() }));
        } catch (e) { showNotification(e.message); } finally { setGeneratingPantun(false); }
      };

      const fetchHistory = async () => {
        if (isGuest || !auth.currentUser) return;
        try {
          const snap = await getDocs(collection(db, 'artifacts', appId, 'users', userId, 'speeches'));
          const d = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
          setHistoryList(d);
        } catch (e) { console.error(e); }
      };

      const handleSaveToHistory = async () => {
        if (isGuest) { 
          setPaymentModalAlert('Fitur Simpan Riwayat Cloud hanya tersedia untuk pengguna Premium. Silakan Upgrade!');
          setShowPaymentModal(true); 
          return; 
        }
        if (!formData.eventName) return showNotification("Isi nama acara.");
        setIsSaving(true);
        try {
          const snap = await getDocs(collection(db, 'artifacts', appId, 'users', userId, 'speeches'));
          if (snap.size >= 10) {
            showNotification("Kuota Penuh (Maks 10). Hapus naskah lama di Riwayat.");
            setIsSaving(false);
            return;
          }
          await addDoc(collection(db, 'artifacts', appId, 'users', userId, 'speeches'), { 
            formData: { ...formData }, 
            guests, 
            points, 
            createdAt: new Date().toISOString() 
          });
          showNotification("Tersimpan di Cloud!");
          if (isHistoryOpen) fetchHistory();
        } catch (e) { showNotification(e.message); } finally { setIsSaving(false); }
      };

      const handleDeleteHistory = async (id) => {
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'users', userId, 'speeches', id));
          setHistoryList(p => p.filter(it => it.id !== id));
          showNotification("Dihapus.");
        } catch (e) { console.error(e); }
      };

      const handleLoadHistoryItem = (item) => {
        if (item.formData) {
          setFormData(item.formData);
        } else {
          const { id, guests: g, points: p, createdAt: c, ...oldFields } = item;
          setFormData(oldFields);
        }
        setGuests(item.guests || [{ title: '' }]);
        setPoints(item.points || ['']);
        setPdfFileName(''); 
        setIsHistoryOpen(false);
        showNotification("Naskah berhasil dimuat dari Riwayat.");
      };

      const getGreetings = () => {
        if (formData.language === 'en') {
           return "GOOD MORNING / GOOD AFTERNOON / GOOD EVENING,\nDISTINGUISHED GUESTS, LADIES AND GENTLEMEN.";
        }
        if (formData.greetingType === 'islamic') {
           return "BISMILLAAHIRRAHMAANIRRAHIIM\nASSALAAMU’ALAIKUM WARAHMATULLAAHI WABARAKAATUH.";
        }
        if (formData.greetingType === 'lintas_agama') {
           return "BISMILLAAHIRRAHMAANIRRAHIIM\nASSALAAMU’ALAIKUM WARAHMATULLAAHI WABARAKAATUH,\nSALAM SEJAHTERA BAGI KITA SEMUA,\nSHALOM, OM SWASTYASTU, NAMO BUDDHAYA, SALAM KEBAJIKAN.";
        }
        return "BISMILLAAHIRRAHMAANIRRAHIIM\nASSALAAMU’ALAIKUM WARAHMATULLAAHI WABARAKAATUH,\nSALAM SEJAHTERA UNTUK KITA SEMUA.";
      };

      const getGuestPrefix = (index) => formData.language === 'en' ? (index === 0 ? "THE HONORABLE, " : "DISTINGUISHED, ") : (index === 0 ? "YTH. " : "YSH. ");
      const getParticipantPrefix = () => formData.language === 'en' ? "AND BELOVED AUDIENCE." : "YSB. PARA PESERTA,\nHADIRIN UNDANGAN YANG SAYA HORMATI.";
      const getInterjections = () => formData.language === 'en' ? ["DISTINGUISHED GUESTS,", "HAPPY ATTENDEES,"] : ["HADIRIN YANG SAYA HORMATI,", "HADIRIN YANG BERBAHAGIA,"];
      const getFinalThanks = () => formData.language === 'en' ? "THANK YOU." : "TERIMA KASIH.\nBILLAAHITTAUFIQ WALHIDAYAH,\nWASSALAAMU’ALAIKUM WARAHMATULLAAHI WABARAKAATUH.";

      // EKSPOR KE HTML WORD (Font Size Uniform 12pt, Rata Kiri Detail Acara, Jarak Paragraf Konsisten)
      const generateSpeechHTML = () => {
        const bodyStyle = "font-family: Arial, sans-serif; font-size: 12pt; line-height: 1.5; color: #000; text-transform: uppercase;";
        const formatCap = (text) => (text || '').toUpperCase();
        const formatBreak = (text) => formatCap(text).replace(/\n/g, '<br/>');
        
        return `
          <div style="${bodyStyle} text-align: center; margin-bottom: 20px;">
            ${formData.logo ? `<img src="${formData.logo}" width="100" /><br/>` : ''}
            ${formData.institutionName ? `<br/><span style="font-weight: bold;">${formatCap(formData.institutionName)}</span><br/><br/>` : ''}
            <span style="font-weight: bold;">SAMBUTAN</span><br/>
            <span style="font-weight: bold;">${formatCap(formData.speakerTitle || '[JABATAN]')}</span><br/>
            PADA ACARA<br/>
            <span style="font-weight: bold;">${formatCap(formData.eventName || '[NAMA ACARA]')}</span><br/>
            
            <div style="text-align: left; width: 100%; margin-top: 20px;">
              <table style="${bodyStyle} text-align: left; font-weight: bold; border-collapse: collapse; margin-left: 0;">
                <tr><td style="width: 150px; vertical-align: top;">HARI / TANGGAL</td><td style="width: 15px; vertical-align: top;">:</td><td style="vertical-align: top;">${formatCap(formData.eventDate || '...')}</td></tr>
                <tr><td style="vertical-align: top;">WAKTU</td><td style="vertical-align: top;">:</td><td style="vertical-align: top;">${formatCap(formData.eventTime || '...')}</td></tr>
                <tr><td style="vertical-align: top;">TEMPAT</td><td style="vertical-align: top;">:</td><td style="vertical-align: top;">${formatCap(formData.eventLocation || '...')}</td></tr>
              </table>
            </div>
            <hr style="border-top: 2px solid #000; margin-top: 15px;" />
          </div>
          <div style="${bodyStyle} text-align: justify;">
            <span style="font-weight: bold;">${formatBreak(getGreetings())}</span><br/><br/>
            <span style="font-weight: bold;">
              ${guests.filter(g => g.title).map((g, i) => `${getGuestPrefix(i)} ${formatCap(g.title)}<br/>`).join('')}
              ${getParticipantPrefix()}
            </span><br/><br/>
            ${formatBreak(formData.openingSpeech)}<br/><br/>
            ${points.filter(p => p).map(p => formatBreak(p)).join('<br/><br/>')}<br/><br/>
            ${formatBreak(formData.closingSpeech)}<br/><br/>
            <span style="font-weight: bold; font-style: italic;">${formatBreak(formData.closingPantun)}</span><br/><br/>
            <div style="text-align: center;">
              <span style="font-weight: bold;">TERIMA KASIH</span><br/><br/><br/><br/>
              <span style="font-weight: bold;">${formatCap(formData.speakerName || '( NAMA TERANG )')}</span>
            </div>
          </div>
        `;
      };

      const handleDownloadWord = () => {
        const html = `<html><head><meta charset='utf-8'></head><body>${generateSpeechHTML()}</body></html>`;
        const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url; link.download = `Sambutan-${(formData.eventName || 'Naskah').replace(/\s+/g, '-')}.doc`; link.click();
      };

      const showNotification = (m) => { setNotification(m); setTimeout(() => setNotification(''), 3000); };

      // PRATINJAU A5 DALAM BROWSER
      const renderSpeechContent = () => (
        <div className="prose max-w-none text-slate-900 font-sans text-[12pt] uppercase text-justify" style={{ fontFamily: 'Arial, sans-serif', lineHeight: '1.5' }}>
          <div className="text-center mb-8 pb-4 border-b-2 border-slate-800 uppercase">
            {formData.logo && <img src={formData.logo} alt="Logo" className="h-24 mx-auto mb-3 object-contain" />}
            {formData.institutionName && <p className="mb-3 mt-2 font-bold">{formData.institutionName}</p>}
            
            <p className="mb-1 font-bold">SAMBUTAN</p>
            <p className="mb-1 font-bold">{formData.speakerTitle || '[JABATAN]'}</p>
            <p className="mb-1">PADA ACARA</p>
            <p className="font-bold">{formData.eventName || '[NAMA ACARA]'}</p>

            <div className="mt-6 text-left w-full mx-0">
               <table className="text-left w-full font-bold">
                 <tbody>
                   <tr><td className="w-36 align-top pb-1">HARI / TANGGAL</td><td className="w-4 align-top pb-1">:</td><td className="pb-1">{formData.eventDate || '...'}</td></tr>
                   <tr><td className="align-top pb-1">WAKTU</td><td className="align-top pb-1">:</td><td className="pb-1">{formData.eventTime || '...'}</td></tr>
                   <tr><td className="align-top pb-1">TEMPAT</td><td className="align-top pb-1">:</td><td className="pb-1">{formData.eventLocation || '...'}</td></tr>
                 </tbody>
               </table>
            </div>
          </div>

          <div className="mb-4 whitespace-pre-line text-left font-bold leading-relaxed">{getGreetings()}</div>
          <div className="mb-6 text-left space-y-1 font-bold">
            {guests.filter(g => g.title).map((g, i) => <p key={i}>{getGuestPrefix(i)} {g.title}</p>)}
            <p className="mt-2">{getParticipantPrefix()}</p>
          </div>
          
          <div className="mb-4 indent-8 whitespace-pre-line">{formData.openingSpeech || '[PEMBUKAAN]'}</div>
          
          <div className="mb-4 space-y-4">
            {points.map((p, i) => p && <div key={i} className="indent-8 whitespace-pre-line">{p}</div>)}
          </div>
          
          <div className="mb-4 indent-8 whitespace-pre-line">{formData.closingSpeech || '[PENUTUP]'}</div>
          
          {formData.closingPantun && <div className="my-8 text-center italic font-bold py-2 whitespace-pre-line">{formData.closingPantun}</div>}
          
          <div className="text-center mt-12 uppercase">
            <p className="mb-20 font-bold">TERIMA KASIH</p>
            <p className="font-bold">{formData.speakerName || '( NAMA TERANG )'}</p>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-slate-50 relative text-slate-800">
          <div className="absolute top-0 left-0 w-full h-72 print:hidden z-0 overflow-hidden bg-slate-900">
             <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1478737270239-2f02b77fc618?q=80&w=2000&auto=format&fit=crop')] bg-cover bg-center opacity-20"></div>
             <div className="absolute inset-0 bg-gradient-to-b from-transparent to-slate-50"></div>
          </div>

          <div className="relative z-10 p-4 md:p-8 pt-10">
            <div className="max-w-6xl mx-auto mb-10 print:hidden flex flex-col md:flex-row items-center justify-between gap-6">
              <div className="flex items-center gap-4">
                <div className="bg-white/10 p-3 rounded-2xl backdrop-blur-md border border-white/20 shadow-lg"><FilePenLine className="w-10 h-10 text-cyan-300" /></div>
                <div>
                  <h1 className="text-3xl font-bold text-white tracking-tight drop-shadow-md">PidatoPimpinan.AI</h1>
                  <p className="text-blue-200 mt-1 font-medium text-sm opacity-90">Aplikasi Pembuat Naskah Sambutan Otomatis</p>
                </div>
              </div>
              <div className="flex items-stretch gap-3">
                {isGuest && (
                  <div className="flex flex-col justify-center items-end bg-white/10 backdrop-blur-md border border-white/20 px-5 rounded-xl shadow-lg">
                    <span className="text-[9px] font-black text-slate-300 uppercase tracking-widest leading-none mb-1">Token Tersedia</span>
                    <span className="text-lg font-bold text-emerald-400 leading-none">{guestTokenCount} / 5</span>
                  </div>
                )}
                
                <button onClick={() => {
                    if (isGuest) {
                       setPaymentModalAlert(''); 
                       setShowPaymentModal(true);
                    } else {
                       setIsHistoryOpen(true);
                    }
                }} className="flex items-center gap-2 bg-white/10 hover:bg-white/20 backdrop-blur-md text-white px-5 py-2.5 rounded-xl border border-white/20 transition-colors shadow-lg text-sm font-semibold">
                  {isGuest ? (
                    <><Crown size={18} className="text-amber-400" /> UPGRADE</>
                  ) : (
                    <><History size={18} /> Riwayat</>
                  )}
                </button>

                <div className="flex items-center gap-3 bg-white/10 backdrop-blur-md border border-white/20 px-4 py-2 rounded-xl shadow-lg ml-2">
                  <div className="flex flex-col text-right justify-center">
                    <div className="flex items-center justify-end gap-2 mb-0.5">
                      {!isGuest && (
                        <span className="bg-gradient-to-r from-amber-400 to-orange-500 text-white text-[9px] px-1.5 py-0.5 rounded shadow-sm flex items-center gap-1 font-black tracking-widest uppercase">
                          <Crown size={10} /> PREMIUM
                        </span>
                      )}
                      <span className="text-sm font-bold text-white">{userProfile?.name || 'Pengguna'}</span>
                    </div>
                    <span className="text-xs text-blue-200">{userProfile?.email}</span>
                  </div>
                  <div className="h-8 w-px bg-white/20 mx-1"></div>
                  <button onClick={onLogout} className="text-white hover:text-red-400 transition-colors"><LogOut size={20} /></button>
                </div>
              </div>
            </div>

            <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 print:block">
              <div className="lg:col-span-4 space-y-6 print:hidden">
                <div className="bg-white p-6 rounded-2xl shadow-xl border border-slate-200">
                  <h2 className="text-lg font-semibold text-slate-800 mb-4 border-b pb-2">1. Informasi Acara</h2>
                  <div className="space-y-4">
                    <div className="bg-blue-50/50 p-3 rounded-xl border border-blue-100">
                      <label className="block text-[10px] font-black text-slate-500 mb-2 uppercase tracking-widest">Bahasa</label>
                      <select name="language" value={formData.language} onChange={handleInputChange} className="w-full bg-transparent font-bold text-sm outline-none">
                        <option value="id">Bahasa Indonesia</option>
                        <option value="en">Bahasa Inggris (English)</option>
                        <option value="regional">Bahasa Daerah</option>
                      </select>
                      {formData.language === 'regional' && (
                        <select name="regionalLanguage" value={formData.regionalLanguage} onChange={handleInputChange} className="w-full mt-3 p-2 bg-white border border-slate-200 rounded-lg text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500">
                          <option value="" disabled>Pilih Bahasa Daerah...</option>
                          <option value="Jawa">Jawa</option>
                          <option value="Sunda">Sunda</option>
                          <option value="Minang">Minangkabau</option>
                          <option value="Batak">Batak</option>
                          <option value="Bali">Bali</option>
                          <option value="Bugis">Bugis</option>
                          <option value="Madura">Madura</option>
                          <option value="Banjar">Banjar</option>
                          <option value="Betawi">Betawi</option>
                          <option value="Melayu">Melayu</option>
                          <option value="Aceh">Aceh</option>
                          <option value="Dayak">Dayak</option>
                        </select>
                      )}
                    </div>
                    <div className="flex flex-col gap-3">
                      <div className="flex items-center gap-3">
                        <div className="h-16 w-16 border-2 border-dashed border-slate-300 rounded-xl flex items-center justify-center bg-slate-50 overflow-hidden">
                          {formData.logo ? <img src={formData.logo} className="h-full w-full object-contain" /> : <ImageIcon size={24} className="text-slate-300" />}
                        </div>
                        <label className="flex-1 cursor-pointer bg-blue-50 text-blue-600 hover:bg-blue-100 border border-blue-200 py-3 rounded-xl text-center text-sm font-medium transition-colors flex items-center justify-center gap-2 font-bold uppercase tracking-wider">
                          <Upload size={16} /> Upload Logo<input type="file" onChange={handleLogoUpload} className="hidden" />
                        </label>
                        {formData.logo && <button onClick={removeLogo} className="p-2 text-red-500 hover:bg-red-50 rounded-lg"><Trash2 size={18}/></button>}
                      </div>
                      <input name="institutionName" value={formData.institutionName} placeholder="Nama Instansi (Opsional)" onChange={handleInputChange} className="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" autoComplete="off" />
                    </div>
                    
                    <input name="speakerTitle" value={formData.speakerTitle} placeholder="Jabatan Pembicara" onChange={handleInputChange} className="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" autoComplete="off" />
                    <input name="eventName" value={formData.eventName} placeholder="Nama Acara" onChange={handleInputChange} className="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" autoComplete="off" />
                    <div className="space-y-3 p-3 bg-slate-50/80 rounded-xl border border-slate-200/60">
                      <input name="eventDate" value={formData.eventDate} placeholder="Hari / Tanggal" onChange={handleInputChange} className="w-full p-2.5 bg-white border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" autoComplete="off" />
                      <input name="eventTime" value={formData.eventTime} placeholder="Waktu" onChange={handleInputChange} className="w-full p-2.5 bg-white border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" autoComplete="off" />
                      <input name="eventLocation" value={formData.eventLocation} placeholder="Tempat" onChange={handleInputChange} className="w-full p-2.5 bg-white border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" autoComplete="off" />
                    </div>
                    <input name="eventTheme" value={formData.eventTheme} placeholder="Tema Acara" onChange={handleInputChange} className="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" autoComplete="off" />
                    <input name="speakerName" value={formData.speakerName} placeholder="Nama Pembicara" onChange={handleInputChange} className="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" autoComplete="off" />
                  </div>
                </div>

                <div className="bg-white p-6 rounded-2xl shadow-xl border border-slate-200">
                   <div className="flex justify-between items-center mb-4 border-b pb-2"><h2 className="text-lg font-semibold text-slate-800">2. Daftar Tamu</h2><button onClick={addGuest} className="text-xs bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg font-medium transition-colors hover:bg-blue-100">+ Tambah</button></div>
                   <div className="space-y-3">
                    {guests.map((g, i) => (
                      <div key={i} className="flex gap-2 items-start">
                        <div className="flex-1">
                          <input placeholder="Jabatan, Nama (Opsional)" value={g.title} onChange={e => updateGuest(i, 'title', e.target.value)} className="w-full p-2 bg-slate-50 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" autoComplete="off" />
                        </div>
                        <button onClick={() => removeGuest(i)} className="text-slate-300 hover:text-red-500 p-2"><Trash2 size={18} /></button>
                      </div>
                    ))}
                   </div>
                </div>

                <div className="bg-white p-6 rounded-2xl shadow-xl border border-blue-200/60 ring-1 ring-blue-50">
                  <div className="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 className="text-lg font-semibold text-slate-800">3. Pembukaan</h2>
                    <div className="flex items-center gap-2">
                      <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Paragraf:</label>
                      <select name="openingParCount" value={formData.openingParCount} onChange={handleInputChange} className="p-1 px-2 text-xs border border-slate-300 rounded-lg bg-slate-50 outline-none focus:ring-1 focus:ring-blue-500 font-bold">
                        {[1, 2, 3, 4, 5].map(n => <option key={n} value={n}>{n}</option>)}
                      </select>
                    </div>
                  </div>
                  
                  <select name="greetingType" value={formData.greetingType} onChange={handleInputChange} className="w-full mb-4 p-2.5 bg-blue-50/50 border border-blue-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 text-blue-800">
                    <option value="formal">Salam Nasional (Formal)</option>
                    <option value="islamic">Salam Agamis (Islami)</option>
                    <option value="lintas_agama">Salam Lintas Agama</option>
                  </select>

                  <button onClick={handleAIOpening} disabled={generatingOpening} className="w-full mb-3 py-2.5 bg-gradient-to-r from-blue-600 to-cyan-600 text-white rounded-xl font-medium text-sm flex items-center justify-center gap-2 shadow-md hover:brightness-110 transition-all disabled:opacity-70">
                    {generatingOpening ? <Loader2 size={16} className="animate-spin" /> : <Sparkles size={16} />} Generate Pembukaan ({formData.openingParCount} Paragraf)
                  </button>
                  <textarea rows={6} name="openingSpeech" value={formData.openingSpeech} onChange={handleInputChange} className="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 leading-relaxed" placeholder="Paragraf pembukaan akan muncul di sini..." />
                </div>

                <div className="bg-white p-6 rounded-2xl shadow-xl border border-indigo-200/60 ring-1 ring-indigo-50">
                   <div className="flex justify-between items-center mb-4 border-b pb-2">
                     <h2 className="text-lg font-semibold text-slate-800">4. Isi</h2>
                     <div className="flex items-center gap-3">
                       <div className="flex items-center gap-2">
                         <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider hidden sm:block">Hasil AI:</label>
                         <select name="contentParCount" value={formData.contentParCount} onChange={handleInputChange} className="p-1 px-2 text-xs border border-slate-300 rounded-lg bg-slate-50 outline-none focus:ring-1 focus:ring-indigo-500 font-bold" title="Jumlah paragraf dari setiap Poin">
                           {[1, 2, 3, 4, 5].map(n => <option key={n} value={n}>{n} Paragraf</option>)}
                         </select>
                       </div>
                     </div>
                   </div>
                   
                   <div className="mb-4 bg-indigo-50/50 p-3 rounded-xl border border-indigo-100 flex flex-col sm:flex-row items-start sm:items-center gap-3">
                     <div className="flex-1">
                        <p className="text-xs font-bold text-indigo-800">Dokumen Acuan (Opsional)</p>
                        <p className="text-[10px] text-slate-500 leading-relaxed">Upload file PDF undangan/lampiran acara agar isi sambutan lebih terarah sesuai konteks dokumen.</p>
                     </div>
                     <label className="cursor-pointer bg-indigo-600 text-white hover:bg-indigo-700 px-4 py-2.5 rounded-lg text-xs font-bold transition-all shadow-sm flex items-center gap-2 whitespace-nowrap">
                        {isExtractingPdf ? <Loader2 size={14} className="animate-spin"/> : <FileUp size={14}/>}
                        {pdfFileName ? 'Ganti PDF' : 'Upload PDF'}
                        <input type="file" accept="application/pdf" className="hidden" onChange={handlePdfUpload} />
                     </label>
                   </div>
                   {pdfFileName && <div className="mb-4 text-[10px] bg-emerald-50 border border-emerald-200 text-emerald-700 px-3 py-2 rounded-lg font-bold flex items-center justify-between">📄 {pdfFileName} <button type="button" onClick={() => { setPdfFileName(''); setFormData(p => ({...p, pdfContext: ''})) }} className="text-emerald-500 hover:text-red-500"><X size={14}/></button></div>}

                   <div className="space-y-4">
                    {points.map((p, i) => (
                      <div key={i} className="flex flex-col gap-2 border-b pb-4 last:border-0 border-slate-100">
                        <div className="flex gap-2 items-start">
                          <textarea rows={4} value={p} onChange={e => updatePoint(i, e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 leading-relaxed" placeholder="Tulis gagasan atau poin materi..." />
                          {points.length > 1 && <button onClick={() => removePoint(i)} className="text-slate-300 hover:text-red-500 p-2"><Trash2 size={18}/></button>}
                        </div>
                        <button onClick={() => handleAIGeneratePoint(i)} disabled={generatingIndex === i || !p} className="text-xs font-medium text-indigo-700 bg-indigo-50 hover:bg-indigo-100 px-4 py-2 rounded-full w-fit transition-colors shadow-sm border border-indigo-200 flex items-center gap-1.5 disabled:opacity-50">
                          {generatingIndex === i ? <Loader2 size={14} className="animate-spin" /> : <Sparkles size={14} />} Kembangkan AI ({formData.contentParCount} Paragraf)
                        </button>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="bg-white p-6 rounded-2xl shadow-xl border border-blue-200/60 ring-1 ring-blue-50">
                  <div className="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 className="text-lg font-semibold text-slate-800">5. Penutup</h2>
                    <div className="flex items-center gap-2">
                      <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Paragraf:</label>
                      <select name="closingParCount" value={formData.closingParCount} onChange={handleInputChange} className="p-1 px-2 text-xs border border-slate-300 rounded-lg bg-slate-50 outline-none focus:ring-1 focus:ring-blue-500 font-bold">
                        {[1, 2, 3, 4, 5].map(n => <option key={n} value={n}>{n}</option>)}
                      </select>
                    </div>
                  </div>
                  <button onClick={handleAIClosing} disabled={generatingClosing} className="w-full mb-3 py-2.5 bg-gradient-to-r from-blue-600 to-cyan-600 text-white rounded-xl font-medium text-sm flex items-center justify-center gap-2 shadow-md hover:brightness-110 transition-all disabled:opacity-70">
                    {generatingClosing ? <Loader2 size={16} className="animate-spin" /> : <Sparkles size={16} />} Generate Penutup ({formData.closingParCount} Paragraf)
                  </button>
                  <textarea rows={4} name="closingSpeech" value={formData.closingSpeech} onChange={handleInputChange} className="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 leading-relaxed" placeholder="Paragraf penutup akan muncul di sini..." />
                </div>

                <div className="bg-white p-6 rounded-2xl shadow-xl border border-purple-200/60 ring-1 ring-purple-50">
                  <h2 className="text-lg font-semibold text-slate-800 mb-4 border-b pb-2">6. Pantun Penutup</h2>
                  <button onClick={handleAIPantunGenerate} disabled={generatingPantun} className="w-full mb-3 py-2.5 bg-gradient-to-r from-purple-600 to-indigo-600 text-white rounded-xl font-medium text-sm flex items-center justify-center gap-2 shadow-md hover:brightness-110 transition-all disabled:opacity-70">
                    {generatingPantun ? <Loader2 size={16} className="animate-spin" /> : <Sparkles size={16} />} Generate Pantun Otomatis
                  </button>
                  <textarea rows={4} name="closingPantun" value={formData.closingPantun} onChange={handleInputChange} className="w-full p-4 bg-purple-50/30 border border-purple-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-purple-400 text-center italic text-slate-700 font-medium leading-relaxed" placeholder="Hasil pantun AI akan muncul di sini..." />
                </div>
              </div>

              <div className="lg:col-span-8 flex flex-col gap-4">
                <div className="bg-white/95 backdrop-blur-md p-4 rounded-2xl shadow-xl border border-slate-200 flex flex-wrap items-center justify-between gap-4 print:hidden sticky top-4 z-20">
                  <div className="flex items-center gap-4">
                    <span className="px-3 py-1.5 text-xs font-bold text-slate-600 bg-slate-100 rounded-lg border border-slate-200">Ukuran Kertas: A5</span>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={handleSaveToHistory} disabled={isSaving} className="flex items-center gap-2 px-5 py-2.5 bg-blue-100 text-blue-700 rounded-xl hover:bg-blue-200 text-sm font-semibold transition-all shadow-sm active:scale-95 disabled:opacity-70">
                      {isSaving ? <Loader2 size={18} className="animate-spin" /> : <Save size={18} />} Simpan Riwayat
                    </button>
                    <button onClick={handleDownloadWord} className="flex items-center gap-2 px-6 py-2.5 bg-slate-800 text-white rounded-xl hover:bg-slate-900 text-sm font-semibold transition-all shadow-md active:scale-95">
                      <FileType size={18} /> Export Word
                    </button>
                  </div>
                </div>

                            <button onClick={() => handleDeleteHistory(item.id)} className="p-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-xl transition-all border border-transparent hover:border-red-100"><Trash2 size={20} /></button>

                      ))}

                  )}

          )}
        </div>
      );
    }

    function App() {
      const [user, setUser] = useState(null);
      const [userProfile, setUserProfile] = useState(null);
      const [loading, setLoading] = useState(true);
      const [view, setView] = useState('login'); 
      const [isGuest, setIsGuest] = useState(false);
      
      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          if (currentUser) {
            setUser(currentUser);
            if (!currentUser.isAnonymous) { 
              setUserProfile({ email: currentUser.email, name: currentUser.displayName || 'PENGGUNA' }); 
              setIsGuest(false); 
            } else { 
              const storedSession = localStorage.getItem('pidatoSession'); 
              if (storedSession) { 
                const ps = JSON.parse(storedSession); 
                setIsGuest(true); 
                setUserProfile(ps); 
              } 
            }
          } else { 
            setUser(null); 
            setUserProfile(null); 
            setIsGuest(false); 
          }
          setLoading(false);
        });
        return () => unsubscribe();
      }, []);
      
      const handleGuestLoginSuccess = (e) => { const sd = { name: 'TAMU (UJI COBA)', email: e, role: 'guest' }; localStorage.setItem('pidatoSession', JSON.stringify(sd)); setIsGuest(true); setUserProfile(sd); };
      const handleLogout = async () => { setIsGuest(false); localStorage.removeItem('pidatoSession'); await signOut(auth); setView('login'); };
      const handleGoToRegister = async () => { if (isGuest) { setIsGuest(false); localStorage.removeItem('pidatoSession'); } await signOut(auth); setView('register'); };
      
      if (loading) return <div className="min-h-screen flex items-center justify-center bg-[#0f172a]"><Loader2 className="animate-spin text-cyan-400" size={40} /></div>;
      
      if ((user && !user.isAnonymous) || isGuest) return <MainApp onLogout={handleLogout} userProfile={userProfile} userId={user?.uid || 'guest'} isGuest={isGuest} onGoToRegister={handleGoToRegister} />;
      
      return (
        <div className="min-h-screen relative flex flex-col justify-center items-center p-4 overflow-hidden bg-[#0f172a]">
          <div className="absolute inset-0 z-0 pointer-events-none">
             <div className="absolute inset-0 bg-cover bg-center opacity-30" style={{backgroundImage: `url('https://images.unsplash.com/photo-1478737270239-2f02b77fc618?q=80&w=2000&auto=format&fit=crop')`}}></div>
             <div className="absolute inset-0 bg-gradient-to-b from-[#0f172a]/80 via-[#0f172a]/95 to-[#0f172a]"></div>
             <div className="absolute top-[0%] left-[20%] w-[500px] h-[500px] bg-cyan-900/30 rounded-full mix-blend-screen filter blur-[120px] opacity-40 animate-pulse"></div>
          </div>
          <div className="w-full max-w-[420px] bg-[#111827] rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-slate-800/80 p-10 z-10 relative text-white">
            <div className="text-center mb-10">
              <div className="inline-flex items-center justify-center w-16 h-14 bg-slate-800/80 rounded-full border border-cyan-900/50 mb-4 shadow-[0_0_20px_rgba(6,182,212,0.15)]"><FilePenLine className="w-7 h-7 text-cyan-400 drop-shadow-[0_0_5px_rgba(6,182,212,0.5)]" /></div>
              <h1 className="text-3xl font-black text-cyan-400 drop-shadow-[0_0_12px_rgba(6,182,212,0.4)] tracking-tight">PidatoPimpinan.AI</h1>
              <p className="text-xs text-slate-400 font-bold mt-2 tracking-wide">Aplikasi Pembuat Naskah Sambutan Otomatis</p>
            </div>
            {view === 'login' && <LoginForm setView={setView} />}
            {view === 'guest_login' && <GuestLoginForm setView={setView} onGuestLoginSuccess={handleGuestLoginSuccess} onGoToRegister={handleGoToRegister} />}
            {view === 'register' && <RegisterForm setView={setView} />}
            {view === 'forgot' && <ForgotPasswordForm setView={setView} />}
          </div>
        </div>
      );
    }

    function LoginForm({ setView }) {
      const [email, setEmail] = useState(''); const [password, setPassword] = useState(''); const [error, setError] = useState(''); const [isSubmitting, setIsSubmitting] = useState(false);
      const hl = async (e) => { e.preventDefault(); setIsSubmitting(true); setError(''); try { await signInWithEmailAndPassword(auth, email, password); } catch (err) { setError('LOGIN GAGAL. CEK EMAIL/PASSWORD.'); } finally { setIsSubmitting(false); } };
      return (
        <form onSubmit={hl} className="space-y-6">
          <div className="flex items-center gap-3 mb-2"><div className="w-1.5 h-6 bg-cyan-500 rounded-sm shadow-[0_0_8px_rgba(6,182,212,0.8)]"></div><h2 className="text-sm font-black text-white uppercase tracking-widest">LOGIN PREMIUM</h2></div>
          {error && <div className="text-red-400 text-[10px] bg-red-900/20 p-3 rounded-xl border border-red-900/50 text-center font-black uppercase tracking-widest">{error}</div>}
          <div><label className="block text-[9px] font-black text-cyan-500 mb-2 uppercase tracking-[0.2em]">Email</label><input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full px-4 py-4 bg-[#0B1120] border border-slate-800 rounded-xl focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 outline-none text-slate-200 text-xs font-bold transition-all" placeholder="user@pidatopimpinan.ai" /></div>
          <div><label className="block text-[9px] font-black text-cyan-500 mb-2 uppercase tracking-[0.2em]">Password</label><input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full px-4 py-4 bg-[#0B1120] border border-slate-800 rounded-xl focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 outline-none text-slate-200 text-xs font-bold transition-all" /></div>
          <div className="flex justify-end"><button type="button" onClick={() => setView('forgot')} className="text-[10px] text-cyan-500 font-black hover:text-cyan-400 transition-colors">Lupa passwordnya?</button></div>
          <button type="submit" disabled={isSubmitting} className="w-full bg-gradient-to-r from-cyan-600 to-blue-600 text-white py-4 rounded-xl font-black shadow-[0_0_20px_rgba(6,182,212,0.2)] flex items-center justify-center text-xs tracking-[0.2em] uppercase transition-all active:scale-95">{isSubmitting ? <Loader2 className="animate-spin w-5 h-5" /> : 'ACCESS SYSTEM'}</button>
          <button type="button" onClick={() => setView('guest_login')} className="w-full bg-[#1e293b] border border-slate-700 text-slate-300 py-4 rounded-xl font-black hover:bg-slate-700 transition-all flex items-center justify-center gap-2 text-xs tracking-[0.1em] uppercase"><ArrowRight size={14} className="text-emerald-400" /> COBA GRATIS (TAMU)</button>
          <div className="text-center mt-8 pt-4 border-t border-slate-800/50"><span className="text-[10px] text-slate-500 font-black uppercase tracking-widest opacity-60">BELUM PUNYA AKUN PREMIUM? </span><button type="button" onClick={() => setView('register')} className="text-[10px] text-cyan-500 font-black hover:text-cyan-400 border-b-2 border-cyan-500 ml-1 uppercase tracking-widest pb-0.5">REGISTRASI</button></div>
        </form>
      );
    }

    function RegisterForm({ setView }) {
      const [email, setEmail] = useState(''); const [password, setPassword] = useState(''); const [accessCode, setAccessCode] = useState(''); const [error, setError] = useState(''); const [isSubmitting, setIsSubmitting] = useState(false); const [showPremiumModal, setShowPremiumModal] = useState(false);
      const hr = async (e) => {
        e.preventDefault(); setError(''); setIsSubmitting(true);
        try {
          const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'validateCode', code: accessCode }) });
          const resData = await res.json();
          if (!resData.success) { setError('KODE AKSES TIDAK VALID.'); setIsSubmitting(false); return; }
          const userCred = await createUserWithEmailAndPassword(auth, email, password);
          await setDoc(doc(db, 'artifacts', appId, 'users', userCred.user.uid, 'profile'), { name: email.split('@')[0], email, role: 'user', createdAt: new Date().toISOString() });
          await fetch(GAS_WEB_APP_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'register', name: email.split('@')[0], email, nomorId: userCred.user.uid, password }) });
        } catch (err) { setError(err.message.includes('email-already') ? 'EMAIL SUDAH TERDAFTAR.' : 'PENDAFTARAN GAGAL.'); } finally { setIsSubmitting(false); }
      };
      return (
        <form onSubmit={hr} className="space-y-6">
          <div className="flex items-center gap-3 mb-2"><div className="w-1.5 h-6 bg-purple-500 rounded-sm shadow-[0_0_8px_rgba(168,85,247,0.8)]"></div><h2 className="text-sm font-black text-white uppercase tracking-widest">REGISTRASI PREMIUM</h2></div>
          {error && <div className="text-red-400 text-[10px] bg-red-900/20 p-3 rounded-xl border border-red-900/50 text-center font-black uppercase tracking-widest">{error}</div>}
          
          <div>
            <label className="block text-[9px] font-black text-purple-400 mb-2 uppercase tracking-[0.2em]">Email</label>
            <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full px-4 py-4 bg-[#0B1120] border border-slate-800 rounded-xl focus:ring-1 focus:ring-purple-500 text-slate-200 text-xs font-bold transition-all" placeholder="masukan email aktif" />
          </div>
          
          <div>
            <label className="block text-[9px] font-black text-purple-400 mb-2 uppercase tracking-[0.2em]">Password</label>
            <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full px-4 py-4 bg-[#0B1120] border border-slate-800 rounded-xl focus:ring-1 focus:ring-purple-500 text-slate-200 text-xs font-bold transition-all" placeholder="masukan 6 karakter bebas (huruf/angka)" minLength={6} />
          </div>
          
          <div>
            <div className="flex justify-between items-center mb-2">
              <label className="block text-[9px] font-black text-purple-400 uppercase tracking-[0.2em]">Kode Akses</label>
              <button type="button" onClick={() => setShowPremiumModal(true)} className="text-[9px] bg-purple-900/40 text-purple-200 border border-purple-500/40 px-3 py-1 rounded-lg font-black uppercase tracking-widest">Beli Kode Akses</button>
            </div>
            <input type="text" required value={accessCode} onChange={e => setAccessCode(e.target.value)} className="w-full px-4 py-4 bg-[#0B1120] border border-slate-800 rounded-xl focus:ring-1 focus:ring-purple-500 text-center text-xs font-black uppercase tracking-[0.3em] font-mono" placeholder="masukan kode akses" />
          </div>
          
          <button type="submit" disabled={isSubmitting} className="w-full bg-gradient-to-r from-purple-500 to-blue-600 text-white py-4 rounded-xl font-black shadow-[0_0_20px_rgba(168,85,247,0.2)] flex items-center justify-center text-xs tracking-[0.2em] uppercase transition-all active:scale-95">{isSubmitting ? <Loader2 className="animate-spin w-5 h-5" /> : 'DAFTAR AKUN'}</button>
          
          <div className="text-center mt-8 pt-4 border-t border-slate-800/50">
            <span className="text-[10px] text-slate-500 font-black uppercase tracking-widest opacity-60">SUDAH PUNYA AKUN? </span>
            <button type="button" onClick={() => setView('login')} className="text-[10px] text-purple-400 font-black hover:text-purple-300 border-b-2 border-purple-400 ml-1 uppercase tracking-widest pb-0.5">LOGIN</button>
          </div>
          
          {showPremiumModal && <PremiumModal onClose={() => setShowPremiumModal(false)} onRegister={() => setShowPremiumModal(false)} />}
        </form>
      );
    }

    function GuestLoginForm({ setView, onGuestLoginSuccess, onGoToRegister }) {
      const [email, setEmail] = useState(''); const [error, setError] = useState(''); const [isChecking, setIsChecking] = useState(false); const [showPremiumModal, setShowPremiumModal] = useState(false);
      const [modalAlert, setModalAlert] = useState(''); 

      const hga = async (e) => {
        e.preventDefault(); setError(''); if (!email) return setError('MASUKKAN EMAIL.');
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; if (!emailRegex.test(email)) return setError('EMAIL TIDAK VALID.');
        
        const lockedEmail = localStorage.getItem('pidato_guest_email');
        if (lockedEmail && lockedEmail.toLowerCase() !== email.toLowerCase()) {
          return setError(`Anda sudah mencoba dengan email tamu ${lockedEmail.toLowerCase()}. Jika ingin mencoba sepuasnya bisa memakai akun premium. Terimakasih`);
        }

        setIsChecking(true);
        try {
          await signInAnonymously(auth); let dId = localStorage.getItem('pidato_device_id');
          if (!dId) { dId = 'dev_' + Math.random().toString(36).substring(2, 15); localStorage.setItem('pidato_device_id', dId); }
          
          const se = email.toLowerCase().replace(/[^a-z0-9]/g, '_'); let cud = 0, cue = 0;
          try { 
            const snapD = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'guestUsage', dId)); 
            if (snapD.exists()) {
              cud = snapD.data().usage || 0; 
              const registeredEmail = snapD.data().email;
              if (registeredEmail && registeredEmail.toLowerCase() !== email.toLowerCase()) {
                setError(`Anda sudah mencoba dengan email tamu ${registeredEmail.toLowerCase()}. Jika ingin mencoba sepuasnya bisa memakai akun premium. Terimakasih`);
                await signOut(auth);
                return;
              }
            }
            const snapE = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'guestUsage', se)); 
            cue = snapE.exists() ? snapE.data().usage || 0 : 0; 
          } catch (err) { 
            cud = parseInt(localStorage.getItem('guestUsage_' + dId) || '0'); 
            cue = parseInt(localStorage.getItem('guestUsage_' + se) || '0'); 
          }
          
          if (cud >= 5 || cue >= 5) { 
            setModalAlert('Token gratis Anda sudah habis! Silakan Upgrade Premium untuk mencoba sepuasnya.');
            setShowPremiumModal(true); 
            return; 
          }
          
          if (GAS_WEB_APP_URL && cud === 0 && cue === 0) {
            try {
              fetch(GAS_WEB_APP_URL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                body: JSON.stringify({ action: 'logGuest', email: email, deviceId: dId }) 
              });
            } catch(e) { console.error("Gagal log tamu ke sheet", e); }
          }

          const currentUsage = Math.max(cud, cue);
          try {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'guestUsage', dId), { 
              usage: currentUsage, 
              email: email, 
              role: 'TAMU (COBA GRATIS)',
              lastUsed: new Date().toISOString() 
            }, { merge: true });
            
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'guestUsage', se), { 
              usage: currentUsage, 
              email: email, 
              role: 'TAMU (COBA GRATIS)',
              deviceId: dId,
              lastUsed: new Date().toISOString() 
            }, { merge: true });
          } catch (err) {
            localStorage.setItem('guestUsage_' + dId, currentUsage.toString());
            localStorage.setItem('guestUsage_' + se, currentUsage.toString());
          }

          localStorage.setItem('pidato_guest_email', email);
          onGuestLoginSuccess(email);
        } catch (err) { setError('GAGAL MEMUAT.'); await signOut(auth); } finally { setIsChecking(false); }
      };
      
      return (
        <form onSubmit={hga} className="space-y-6">
          <div className="flex items-center gap-3 mb-2"><div className="w-1.5 h-6 bg-emerald-500 rounded-sm shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div><h2 className="text-sm font-black text-white uppercase tracking-widest">AKSES TAMU</h2></div>
          {error && <div className="text-red-400 text-[10px] bg-red-900/20 p-3 rounded-xl border border-red-900/50 text-center font-black uppercase tracking-widest leading-relaxed">{error}</div>}
          
          <div className="text-center mb-6">
            <p className="text-xs text-slate-400 font-medium leading-relaxed">
              Dapatkan 5 Token gratis untuk mencoba kecanggihan PidatoPimpinan.AI
            </p>
          </div>

          <div>
            <label className="block text-[9px] font-black text-emerald-500 mb-2 uppercase tracking-[0.2em]">Alamat Email Aktif</label>
            <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full px-4 py-4 bg-[#0B1120] border border-slate-800 rounded-xl focus:ring-1 focus:ring-emerald-500 text-slate-200 text-xs font-bold transition-all" placeholder="email@anda.com" />
          </div>
          
          <button type="submit" disabled={isChecking} className="w-full bg-gradient-to-r from-emerald-600 to-teal-600 text-white py-4 rounded-xl font-black shadow-[0_0_15px_rgba(16,185,129,0.2)] flex items-center justify-center text-xs tracking-[0.2em] uppercase transition-all active:scale-95">
            {isChecking ? <Loader2 className="animate-spin w-5 h-5" /> : 'MULAI COBA GRATIS'}
          </button>
          
          <div className="text-center mt-8 pt-4 border-t border-slate-800/50">
            <span className="text-[10px] text-slate-500 font-black uppercase tracking-widest opacity-60">SUDAH PUNYA AKUN? </span>
            <button type="button" onClick={() => setView('login')} className="text-[10px] text-emerald-400 font-black hover:text-emerald-300 border-b-2 border-emerald-400 ml-1 uppercase tracking-widest pb-0.5">LOGIN</button>
          </div>
          
          {showPremiumModal && <PremiumModal onClose={() => setShowPremiumModal(false)} onRegister={() => { setShowPremiumModal(false); onGoToRegister(); }} alertMessage={modalAlert} />}
        </form>
      );
    }

    function ForgotPasswordForm({ setView }) {
      const [email, setEmail] = useState(''); const [message, setMessage] = useState(''); const [error, setError] = useState(''); const [isSubmitting, setIsSubmitting] = useState(false);
      const hfr = async (e) => {
        e.preventDefault(); setIsSubmitting(true); setError(''); setMessage('');
        try { 
          await sendPasswordResetEmail(auth, email); 
          setMessage('Tautan reset password telah dikirim ke email Anda. Silakan cek Inbox/Spam.'); 
        } catch (err) { 
          setError('GAGAL MENGIRIM RESET.'); 
        } finally { setIsSubmitting(false); }
      };
      return (
        <form onSubmit={hfr} className="space-y-6">
          <div className="flex items-center gap-3 mb-2"><div className="w-1.5 h-6 bg-cyan-500 rounded-sm shadow-[0_0_8px_rgba(6,182,212,0.8)]"></div><h2 className="text-sm font-black text-white uppercase tracking-widest">RESET PASSWORD</h2></div>
          {error && <div className="text-red-400 text-[10px] bg-red-900/20 p-3 rounded-xl border border-red-900/50 text-center font-black uppercase tracking-widest">{error}</div>}
          {message && <div className="text-emerald-400 text-xs bg-emerald-900/20 p-4 rounded-xl border border-emerald-900/50 text-center font-bold leading-relaxed">{message}</div>}
          <div className="text-center mb-6"><p className="text-xs text-slate-400 font-medium leading-relaxed">Masukkan email Anda untuk menerima tautan reset password dari sistem.</p></div>
          <div><label className="block text-[9px] font-black text-cyan-500 mb-2 uppercase tracking-[0.2em]">Email</label><input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full px-4 py-4 bg-[#0B1120] border border-slate-800 rounded-xl focus:ring-1 focus:ring-cyan-500 text-slate-200 text-xs font-bold transition-all" placeholder="email@anda.com" /></div>
          <button type="submit" disabled={isSubmitting} className="w-full bg-gradient-to-r from-cyan-600 to-blue-600 text-white py-4 rounded-xl font-black shadow-[0_0_20px_rgba(6,182,212,0.2)] flex items-center justify-center text-xs tracking-[0.2em] uppercase transition-all active:scale-95">{isSubmitting ? <Loader2 className="animate-spin w-5 h-5" /> : 'KIRIM TAUTAN RESET'}</button>
          <div className="text-center mt-8 pt-4 border-t border-slate-800/50"><span className="text-[10px] text-slate-500 font-black uppercase tracking-widest opacity-60">SUDAH INGAT PASSWORDNYA? </span><button type="button" onClick={() => setView('login')} className="text-[10px] text-cyan-400 font-black hover:text-cyan-300 border-b-2 border-cyan-400 ml-1 uppercase tracking-widest pb-0.5">LOGIN</button></div>
        </form>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
